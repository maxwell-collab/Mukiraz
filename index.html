<style>

/* Background */
body {
    background-color: #111;
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
}

/* Headings */
h1 {
    color: cyan;
}

h2 {
    color: orange;
}

.container {
    text-align: center;
    padding: 20px;
}

/* Shoe container */
.shoe-box {
    display: inline-block;
    width: 70px;   /* Smaller container */
    margin: 8px;
    padding: 6px;
    background-color: #222;
    border-radius: 8px;
    vertical-align: top;
}

/* ALL images small */
.shoe-box img {
    width: 40px;      /* Smaller images */
    height: 40px;
    display: block;
    margin: 0 auto;
    border-radius: 6px;
    object-fit: cover;
}

/* Video container */
.video-box {
    display: inline-block;
    width: 140px;
    margin: 10px;
    padding: 8px;
    background-color: #222;
    border-radius: 8px;
}

/* Smaller videos */
.video-box video {
    width: 130px;
    height: 80px;
    border-radius: 6px;
    display: block;
    margin: 0 auto;
}

</style>

</head>
